user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain application/json application/javascript text/css;
    gzip_min_length    1000;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    # HTTP only — SSL terminates on router (192.168.90.254)
    server {
        listen 80;
        server_name price.taldau.kz;

        client_max_body_size 10M;

        # Healthcheck
        location /health {
            proxy_pass http://api_backend;
            access_log off;
        }

        # Auth — strict rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # API
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Заглушка — потом заменим на frontend
        location / {
            default_type text/html;
            return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Astana Prices</title></head><body><h1>Astana Prices</h1><p>API: <a href="/api/docs">/api/docs</a></p></body></html>';
        }
    }
}
