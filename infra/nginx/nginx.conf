user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain application/json application/javascript text/css;
    gzip_min_length    1000;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    upstream frontend_backend {
        server frontend:3000;
        keepalive 16;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name astana-prices.kz www.astana-prices.kz;

        ssl_certificate     /etc/letsencrypt/live/astana-prices.kz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/astana-prices.kz/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;

        client_max_body_size 10M;

        # API с rate limit
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Auth — жёстче
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Healthcheck без логов
        location /health {
            proxy_pass http://api_backend;
            access_log off;
        }

        # Frontend + статика Next.js
        location / {
            proxy_pass         http://frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        location ~* \.(js|css|png|jpg|ico|woff2?)$ {
            proxy_pass http://frontend_backend;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
